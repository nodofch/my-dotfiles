# FIRST LINE/ROW: Info & Status
# First param вФАвФМ
[username]
format = " [$user]($style) on "
style_user = "bold white"
style_root = "bold white"
show_always = true

# Second param
[hostname]
format = "[$hostname]($style) in "
style = "bold blue"
trim_at = "-"
ssh_only = false
disabled = false

# Third param
[directory]
style = "purple"
truncation_length = 0
truncate_to_repo = true
truncation_symbol = "repo: "

# Before all the version info (python, nodejs, php, etc.)
[git_status]
style = "white"
ahead = "вЗ°${count}"
diverged = "вЗХвЗ°${ahead_count}вЗ£${behind_count}"
behind = "вЗ£${count}"
deleted = "x"

# Last param in the first line/row
[cmd_duration]
min_time = 1
format = "took [$duration]($style)"
disabled = false


## SECOND LINE/ROW: Prompt
# Somethere at the beginning
[battery]
full_symbol = "пХЄ "
charging_symbol = "пЦГ "
discharging_symbol = "пЦВ "
disabled = true

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
threshold = 15
style = "bold red"
disabled = true

[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
threshold = 50
style = "bold yellow"
disabled = true

[[battery.display]]  # "bold green" style when capacity is between 10% and 30%
threshold = 80
style = "bold green"
disabled = true

# Prompt: optional param 1
[time]
format = " рЯХЩ $time($style)\n"
time_format = "%T"
style = "bright-white"
disabled = true

# Prompt: param 2 вФФвФА
[character]
success_symbol = " [вЭѓ](bold blue)"
error_symbol = " [√Ч](bold red)"

# SYMBOLS
[status]
symbol = "рЯФі"
format = '[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
map_symbol = true
disabled = false

